# Build the Cloud Run image using deploy/Dockerfile.cloudrun (not the local ./Dockerfile).
#   gcloud builds submit --config deploy/cloudbuild.yaml --substitutions=_IMG=<image>
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deploy/Dockerfile.cloudrun", "-t", "${_IMG}", "."]
images:
  - "${_IMG}"
options:
  machineType: E2_HIGHCPU_8
